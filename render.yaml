services:
  - type: web
    name: stud-att-app
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --client.showErrorDetails=true --client.toolbarMode=minimal --client.runOnSave=false --server.enableXsrfProtection=true --server.enableCORS=false --logger.level=info --server.fileWatcherType=none
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
