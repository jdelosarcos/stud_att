[client]
showErrorDetails = true
toolbarMode = "minimal"
runOnSave = false

[server]
port = 8501
headless = true
enableXsrfProtection = true
enableCORS = false
fileWatcherType = "none"
maxUploadSize = 200

[logger]
level = "info"

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"
